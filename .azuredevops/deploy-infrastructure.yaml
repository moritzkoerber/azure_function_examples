trigger: none

pool:
  vmImage: "ubuntu-latest"

variables:
  serviceConnection: "example-federated-sc"

jobs:
  - job: deployInfrastructure
    displayName: "Deploy the infrastructure"
    steps:
      - script: |
          echo "##[group]Install Terraform"
          sudo apt-get install -y gnupg software-properties-common curl
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo apt-key add -
          sudo apt-add-repository "deb https://apt.releases.hashicorp.com $(lsb_release -cs) main"
          sudo apt-get update && sudo apt-get install terraform
          echo "##[endgroup]"
        displayName: "Install Terraform"

      - script: terraform init
        displayName: "Terraform Init"
        workingDirectory: $(System.DefaultWorkingDirectory)/ops

      - script: terraform plan -out=tfplan
        displayName: "Terraform Plan"
        workingDirectory: $(System.DefaultWorkingDirectory)/ops

      - script: terraform apply -input=false -auto-approve tfplan
        displayName: "Terraform Apply"
        workingDirectory: $(System.DefaultWorkingDirectory)/ops
